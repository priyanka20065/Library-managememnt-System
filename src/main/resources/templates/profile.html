<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-user"></i> Profile</h1>
        <nav>
            <a th:href="@{/dashboard}"><i class="fa-solid fa-gauge"></i> Dashboard</a> |
            <a th:href="@{/books}"><i class="fa-solid fa-book"></i> Books</a> |
            <span th:if="${isAdmin}"><a th:href="@{/members}"><i class="fa-solid fa-users"></i> Members</a> |</span>
            <a th:href="@{/transactions}"><i class="fa-solid fa-clock-rotate-left"></i> Transactions</a> |
            <a th:href="@{/profile}"><i class="fa-solid fa-user"></i> Profile</a> |
            <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </header>
    <main>
        <h2><i class="fa-solid fa-user-pen"></i> Edit Profile</h2>
        <form th:action="@{/profile}" method="post">
            <label><i class="fa-solid fa-user"></i> Username: <input type="text" name="username" th:value="${username}" required/></label><br/>
            <label><i class="fa-solid fa-envelope"></i> Email: <input type="email" name="email" th:value="${email}" required/></label><br/>
            <button type="submit"><i class="fa-solid fa-floppy-disk"></i> Save</button>
        </form>
        <h3><i class="fa-solid fa-key"></i> Change Password</h3>
        <form th:action="@{/profile/password}" method="post">
            <label><i class="fa-solid fa-lock"></i> Old Password: <input type="password" name="oldPassword" required/></label><br/>
            <label><i class="fa-solid fa-lock"></i> New Password: <input type="password" name="newPassword" required/></label><br/>
            <button type="submit"><i class="fa-solid fa-key"></i> Change Password</button>
        </form>
    </main>
    <div th:if="${toast}" class="toast" th:text="${toast}"></div>
    <script>
    window.onload = function() {
        var toast = document.querySelector('.toast');
        if (toast) {
            toast.classList.add('show');
            setTimeout(function(){ toast.classList.remove('show'); }, 3000);
        }
    };
    </script>
</body>
</html>
