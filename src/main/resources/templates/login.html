<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-book"></i> Library Management Dashboard</h1>
        <nav>
            <a th:href="@{/dashboard}"><i class="fa-solid fa-gauge"></i> Dashboard</a> |
            <a th:href="@{/books}"><i class="fa-solid fa-book"></i> Books</a> |
            <a th:href="@{/transactions}"><i class="fa-solid fa-clock-rotate-left"></i> Transactions</a> |
            <a th:href="@{/profile}"><i class="fa-solid fa-user"></i> Profile</a> |
            <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </header>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh;">
        <div th:if="${param.error}" style="color: #d32f2f; background: #ffeaea; border: 1px solid #d32f2f; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; font-weight: bold;">
            Invalid username or password.
        </div>
        <form th:action="@{/login}" method="post" style="width: 400px; max-width: 90vw; background: #fff; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); display: flex; flex-direction: column; gap: 1rem;">
            <label style="font-weight: bold;"><i class="fa-solid fa-user"></i> Username: <input type="text" name="username" required style="width: 100%; margin-top: 0.5rem;"/></label>
            <label style="font-weight: bold;"><i class="fa-solid fa-lock"></i> Password: <input type="password" name="password" required style="width: 100%; margin-top: 0.5rem;"/></label>
            <button type="submit" style="background: linear-gradient(90deg, #007cf0 0%, #00dfd8 100%); color: #fff; font-weight: bold; border: none; border-radius: 8px; padding: 0.75rem; font-size: 1.1rem; cursor: pointer;"><i class="fa-solid fa-arrow-right"></i> Login</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; font-size: 1.1rem;">Don't have an account? <a th:href="@{/signup}">Sign up</a></p>
    </div>
    <div th:if="${toast}" class="toast" th:text="${toast}"></div>
    <script>
    window.onload = function() {
        var toast = document.querySelector('.toast');
        if (toast) {
            toast.classList.add('show');
            setTimeout(function(){ toast.classList.remove('show'); }, 3000);
        }
    };
    </script>
</body>
</html>
