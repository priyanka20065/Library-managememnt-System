<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Members</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header>
    <div class="logo" style="display:flex;align-items:center;gap:10px;">
        <img src="https://i.pinimg.com/1200x/f8/35/ea/f835ea876b57da00c6754a4e2065549a.jpg" alt="Logo" style="height:32px;vertical-align:middle;border-radius:6px;"> 
        <span style="font-weight:bold;font-size:1.5em;">Library System</span>
    </div>
    <nav>
        <a th:href="@{/dashboard}"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <a th:href="@{/books}"><i class="fa-solid fa-book"></i> Books</a>
        <span th:if="${isAdmin}"><a th:href="@{/members}"><i class="fa-solid fa-users"></i> Members</a></span>
        <a th:href="@{/transactions}"><i class="fa-solid fa-clock-rotate-left"></i> Transactions</a>
        <a th:href="@{/profile}"><i class="fa-solid fa-user"></i> Profile</a>
        <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </nav>
</header>
<main>
    <h2><i class="fa-solid fa-users"></i> Members</h2>
    <a th:href="@{/members/add}"><button><i class="fa-solid fa-user-plus"></i> Add Member</button></a>
    <table>
        <thead>
            <tr><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
        </thead>
        <tbody>
            <tr th:each="member : ${members}">
                <td th:text="${member.username}"></td>
                <td th:text="${member.email}"></td>
                <td th:text="${member.role}"></td>
                <td>
                    <a th:href="@{'/members/edit/' + ${member.id}}"><i class="fa-solid fa-pen"></i> Edit</a> |
                    <a th:href="@{'/members/delete/' + ${member.id}}"><i class="fa-solid fa-trash"></i> Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</main>
<div th:if="${toast}" class="toast" th:text="${toast}"></div>
<script>
window.onload = function() {
    var toast = document.querySelector('.toast');
    if (toast) {
        toast.classList.add('show');
        setTimeout(function(){ toast.classList.remove('show'); }, 3000);
    }
};
</script>
</body>
</html>
