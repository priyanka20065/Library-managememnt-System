<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #fff;
            min-height: 100vh;
        }
        .dashboard-container {
            max-width: 1200px;
            margin: 2.5rem auto;
            padding: 2.5rem 2rem;
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(79, 70, 229, 0.13);
        }
        .dashboard-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .dashboard-header i {
            font-size: 3.5rem;
            color: #648fed;
            filter: drop-shadow(0 2px 8px #648fed44);
        }
        .dashboard-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 0.3rem 0;
            color: #312e81;
        }
        .dashboard-header div {
            color: #5b5b8a;
            font-size: 1.15rem;
        }
        .dashboard-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 2.2rem;
            margin-bottom: 2.5rem;
        }
        .dashboard-card {
            flex: 1 1 220px;
            min-width: 220px;
            background: #fff;
            border-radius: 26px;
            padding: 2.7rem 1.7rem 1.9rem 1.7rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 24px #648fed33;
            border: 1.5px solid #e3e8f0;
            transition: transform 0.18s, box-shadow 0.18s;
            position: relative;
        }
        .dashboard-card:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 12px 36px #4179fb44;
        }
        .dashboard-card i {
            font-size: 2.7rem;
            margin-bottom: 0.7rem;
            color: #fff;
            background: #4179fb;
            border-radius: 50%;
            padding: 0.7rem;
            box-shadow: 0 2px 8px #4179fb33;
        }
        .dashboard-card .card-title {
            font-size: 1.18rem;
            color: #1a237e;
            margin-bottom: 0.4rem;
            font-weight: 600;
            text-shadow: none;
        }
        .dashboard-card .card-value {
            font-size: 2.3rem;
            font-weight: 700;
            color: #1a237e;
            letter-spacing: 1px;
            text-shadow: none;
        }
        .dashboard-links {
            display: flex;
            gap: 2.2rem;
            justify-content: center;
            margin-top: 2.5rem;
        }
        .dashboard-link {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            background: #648fed;
            color: #fff;
            padding: 0.9rem 2.1rem;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.18rem;
            font-weight: 500;
            box-shadow: 0 2px 12px #648fed44;
            transition: background 0.18s, box-shadow 0.18s, transform 0.18s;
        }
        .dashboard-link:hover {
            background: #4179fb;
            box-shadow: 0 8px 32px #648fed88;
            transform: translateY(-2px) scale(1.04);
        }
        @media (max-width: 900px) {
            .dashboard-cards {
                flex-direction: column;
                gap: 1.2rem;
            }
            .dashboard-links {
                flex-direction: column;
                gap: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-gauge"></i> Library Dashboard</h1>
        <nav>
            <a th:href="@{/dashboard}"><i class="fa-solid fa-gauge"></i> Dashboard</a> |
            <a th:href="@{/books}"><i class="fa-solid fa-book"></i> Books</a> |
            <span th:if="${isAdmin}"><a th:href="@{/members}"><i class="fa-solid fa-users"></i> Members</a> |</span>
            <a th:href="@{/transactions}"><i class="fa-solid fa-clock-rotate-left"></i> Transactions</a> |
            <a th:href="@{/profile}"><i class="fa-solid fa-user"></i> Profile</a> |
            <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </header>
    <main class="dashboard-container">
        <div class="dashboard-header">
            <i class="fa-solid fa-gauge"></i>
            <div>
                <h2>Welcome to the Library Dashboard</h2>
                <div style="color:#555; font-size:1.1rem;">Overview of your library at a glance</div>
            </div>
        </div>
        <div class="dashboard-cards">
            <div class="dashboard-card">
                <i class="fa-solid fa-book"></i>
                <div class="card-title">Total Books</div>
                <div class="card-value" th:text="${totalBooks}">0</div>
            </div>
            <div class="dashboard-card">
                <i class="fa-solid fa-users"></i>
                <div class="card-title">Total Users</div>
                <div class="card-value" th:text="${totalUsers}">0</div>
            </div>
            <div class="dashboard-card">
                <i class="fa-solid fa-arrow-up"></i>
                <div class="card-title">Books Borrowed</div>
                <div class="card-value" th:text="${booksBorrowed}">0</div>
            </div>
            <div class="dashboard-card">
                <i class="fa-solid fa-arrow-down"></i>
                <div class="card-title">Books Returned</div>
                <div class="card-value" th:text="${booksReturned}">0</div>
            </div>
            <div class="dashboard-card">
                <i class="fa-solid fa-hourglass-half"></i>
                <div class="card-title">Pending Requests</div>
                <div class="card-value" th:text="${pendingRequests}">0</div>
            </div>
            <div class="dashboard-card">
                <i class="fa-solid fa-indian-rupee-sign"></i>
                <div class="card-title">Fines Collected</div>
                <div class="card-value" th:text="${finesCollected}">0</div>
            </div>
        </div>
        <div class="dashboard-links">
            <a th:href="@{/books}" class="dashboard-link"><i class="fa-solid fa-book"></i> Books</a>
            <a th:href="@{/transactions}" class="dashboard-link"><i class="fa-solid fa-clock-rotate-left"></i> Transactions</a>
            <a th:href="@{/profile}" class="dashboard-link"><i class="fa-solid fa-user"></i> Profile</a>
        </div>
    </main>
</body>
</html>
