<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header>
    <h1><i class="fa-solid fa-book"></i> Library Management Books</h1>
    <nav>
        <a th:href="@{/dashboard}"><i class="fa-solid fa-gauge"></i> Dashboard</a> |
        <a th:href="@{/books}"><i class="fa-solid fa-book"></i> Books</a> |
        <a th:href="@{/transactions}"><i class="fa-solid fa-clock-rotate-left"></i> Transactions</a> |
        <a th:href="@{/profile}"><i class="fa-solid fa-user"></i> Profile</a> |
        <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </nav>
</header>
<main>
    <h2><i class="fa-solid fa-book"></i> Books</h2>
    <form th:action="@{/books/search}" method="get" style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem;">
        <input type="text" name="query" placeholder="Search by title, author, ISBN, or category" style="flex: 2; padding: 0.5rem; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem;"/>
        <select name="category" style="flex: 1; padding: 0.5rem; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; margin-right: 0.5rem;">
            <option value="">All Categories</option>
            <option value="Fiction">Fiction</option>
            <option value="Non-Fiction">Non-Fiction</option>
            <option value="Science">Science</option>
            <option value="Technology">Technology</option>
            <option value="History">History</option>
            <option value="Biography">Biography</option>
            <option value="Children">Children</option>
            <option value="Other">Other</option>
        </select>
        <button type="submit" style="padding: 0.5rem 1.2rem; border-radius: 6px; background: #007cf0; color: #fff; border: none; font-size: 1rem; cursor: pointer;"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
    </form>
    <div th:if="${isAdmin}">
        <a th:href="@{/books/add}"><button><i class="fa-solid fa-plus"></i> Add Book</button></a>
    </div>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN</th>
                <th>Category</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.isbn}"></td>
                <td th:text="${book.category}"></td>
                <td th:text="${book.totalCopies}"></td>
                <td>
                    <span th:if="${isAdmin}">
                        <a th:href="@{'/books/edit/' + ${book.id}}"><i class="fa-solid fa-pen"></i> Edit</a> |
                        <a th:href="@{'/books/delete/' + ${book.id}}"><i class="fa-solid fa-trash"></i> Delete</a>
                    </span>
                    <span th:if="${!isAdmin}">
                        <a th:href="@{'/books/borrow/' + ${book.id}}"><i class="fa-solid fa-book-open-reader"></i> Borrow</a>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
</main>
<div th:if="${toast}" class="toast" th:text="${toast}"></div>
<script>
window.onload = function() {
    var toast = document.querySelector('.toast');
    if (toast) {
        toast.classList.add('show');
        setTimeout(function(){ toast.classList.remove('show'); }, 3000);
    }
};
</script>
</body>
</html>
