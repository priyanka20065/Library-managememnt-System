<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-book"></i> Library Management Dashboard</h1>
        <nav>
            <a th:href="@{/dashboard}"><i class="fa-solid fa-gauge"></i> Dashboard</a> |
            <a th:href="@{/books}"><i class="fa-solid fa-book"></i> Books</a> |
            <a th:href="@{/transactions}"><i class="fa-solid fa-clock-rotate-left"></i> Transactions</a> |
            <a th:href="@{/profile}"><i class="fa-solid fa-user"></i> Profile</a> |
            <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </header>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh;">
        <form th:action="@{/signup}" method="post" style="width: 400px; max-width: 90vw; background: #fff; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); display: flex; flex-direction: column; gap: 1rem;">
            <label style="font-weight: bold;"><i class="fa-solid fa-id-card"></i> Name: <input type="text" name="name" required style="width: 100%; margin-top: 0.5rem;"/></label>
            <label style="font-weight: bold;"><i class="fa-solid fa-id-badge"></i> Member ID: <input type="text" name="memberId" required style="width: 100%; margin-top: 0.5rem;"/></label>
            <label style="font-weight: bold;"><i class="fa-solid fa-user"></i> Username: <input type="text" name="username" required style="width: 100%; margin-top: 0.5rem;"/></label>
            <label style="font-weight: bold;"><i class="fa-solid fa-lock"></i> Password: <input type="password" name="password" required style="width: 100%; margin-top: 0.5rem;"/></label>
            <label style="font-weight: bold;"><i class="fa-solid fa-envelope"></i> Email: <input type="email" name="email" required style="width: 100%; margin-top: 0.5rem;"/></label>
            <label style="font-weight: bold;"><i class="fa-solid fa-user-shield"></i> Role:
                <select name="role" required style="width: 100%; margin-top: 0.5rem;">
                    <option value="MEMBER" selected>MEMBER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </label>
            <button type="submit" style="background: linear-gradient(90deg, #007cf0 0%, #00dfd8 100%); color: #fff; font-weight: bold; border: none; border-radius: 8px; padding: 0.75rem; font-size: 1.1rem; cursor: pointer;"><i class="fa-solid fa-user-plus"></i> Sign Up</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; font-size: 1.1rem;">Already have an account? <a th:href="@{/login}">Login</a></p>
    </div>
    <div th:if="${toast}" class="toast" th:text="${toast}"></div>
    <script>
    window.onload = function() {
        var toast = document.querySelector('.toast');
        if (toast) {
            toast.classList.add('show');
            setTimeout(function(){ toast.classList.remove('show'); }, 3000);
        }
    };
    </script>
</body>
</html>
